title: Suspicious Child Process Spawned by Office Application
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: >
  Detects macro-enabled Office documents spawning suspicious child processes.
  Common indicator of phishing payload execution via T1566.001.
references:
  - https://attack.mitre.org/techniques/T1566/001/
  - https://attack.mitre.org/techniques/T1204/002/
author: Bhargav Baranda (Granger0007)
date: 2026/03/06
tags:
  - attack.initial_access
  - attack.t1566.001
  - attack.execution
  - attack.t1204.002
logsource:
  category: process_creation
  product: windows
detection:
  selection_parent:
    ParentImage|endswith:
      - '\WINWORD.EXE'
      - '\EXCEL.EXE'
      - '\POWERPNT.EXE'
      - '\MSPUB.EXE'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
  condition: selection_parent and selection_child
falsepositives:
  - Legitimate business macros that launch scripts (document and whitelist by hash)
  - Developer environments running Office automation
level: high
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
  - ComputerName
